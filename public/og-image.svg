<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#4f46e5" opacity="0.1"/>
  <circle cx="1100" cy="530" r="300" fill="#06b6d4" opacity="0.1"/>
  
  <!-- Logo icon -->
  <rect x="80" y="250" width="60" height="80" rx="8" fill="url(#accent)"/>
  <rect x="95" y="270" width="30" height="40" rx="4" fill="white" opacity="0.3"/>
  
  <!-- Main title -->
  <text x="180" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    Lade Stack
  </text>
  
  <!-- Subtitle -->
  <text x="180" y="340" font-family="Arial, sans-serif" font-size="36" fill="#94a3b8">
    Free ATS-Friendly Resume Builder
  </text>
  
  <!-- Feature badges -->
  <rect x="180" y="380" width="280" height="50" rx="25" fill="url(#accent)"/>
  <text x="320" y="413" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
    22+ Professional Templates
  </text>
  
  <rect x="480" y="380" width="200" height="50" rx="25" fill="white" opacity="0.1"/>
  <text x="580" y="413" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">
    No Signup Required
  </text>
  
  <rect x="700" y="380" width="200" height="50" rx="25" fill="white" opacity="0.1"/>
  <text x="800" y="413" font-family="Arial, sans-serif" font-size="20" fill="#e2e8f0" text-anchor="middle">
    Instant PDF Export
  </text>
  
  <!-- Bottom accent line -->
  <rect x="0" y="580" width="1200" height="4" fill="url(#accent)"/>
  
  <!-- URL -->
  <text x="600" y="610" font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="middle">
    ladestack.com
  </text>
</svg>
